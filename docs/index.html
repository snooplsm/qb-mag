<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QB Mag</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #07162c;
        color: #e7f1ff;
        font-family: "Avenir Next", "Segoe UI", Helvetica, Arial, sans-serif;
      }
      main {
        width: min(760px, calc(100vw - 48px));
        border: 1px solid #244167;
        border-radius: 14px;
        padding: 28px 24px;
        background: linear-gradient(180deg, #0c203f, #0a1932);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 2rem;
      }
      p {
        margin: 0;
        color: #bfd2f5;
        font-size: 1.05rem;
      }
      .links {
        margin-top: 14px;
        display: flex;
        gap: 10px;
      }
      .links a {
        color: #e7f1ff;
        text-decoration: none;
        border: 1px solid #2d4f7e;
        border-radius: 10px;
        padding: 8px 12px;
        background: #132b4d;
      }
      img {
        margin-top: 16px;
        width: 100%;
        border-radius: 12px;
        border: 1px solid #244167;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>QB Mag</h1>
      <p>A GUI desktop interface bridge between qBittorrent Web UI.</p>
      <div class="links">
        <a href="https://github.com/snooplsm/qb-mag/releases">Releases</a>
      </div>
      <img src="./assets/mock-queue.png" alt="QB Mag queue preview" />
    </main>
  </body>
</html>
