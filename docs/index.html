<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QB Mag</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #07162c;
        color: #e7f1ff;
        font-family: "Avenir Next", "Segoe UI", Helvetica, Arial, sans-serif;
      }
      main {
        width: min(760px, calc(100vw - 48px));
        border: 1px solid #244167;
        border-radius: 14px;
        padding: 28px 24px;
        background: linear-gradient(180deg, #0c203f, #0a1932);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 2rem;
      }
      p {
        margin: 0;
        color: #bfd2f5;
        font-size: 1.05rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>QB Mag</h1>
      <p>A GUI interface bridge between qBittorrent Web UI.</p>
    </main>
  </body>
</html>
